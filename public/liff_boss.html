<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>👑 老闆專屬中控台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background: #111827; font-family: 'PingFang TC', sans-serif; color: #f3f4f6; min-height: 100vh; }
        .glass-panel { background: rgba(31, 41, 55, 0.95); border: 1px solid #374151; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
    </style>
</head>
<body class="p-4 flex flex-col items-center">

    <div class="glass-panel w-full max-w-md rounded-2xl p-6 relative overflow-hidden mb-6">
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-yellow-400 to-yellow-600"></div>
        <div class="text-center mb-6 mt-2">
            <h1 class="text-2xl font-bold text-yellow-500 tracking-wide">👑 老闆專屬中控台</h1>
            <p class="text-xs text-gray-400 mt-2">隨時隨地掌控您的帝國營業時間</p>
        </div>

        <!-- 區塊一：常態營業時段設定 -->
        <div class="border-b border-gray-700 pb-6 mb-6">
            <h2 class="text-lg font-semibold text-white mb-4 flex items-center"><span class="mr-2">⚙️</span> 常態開放時段設定</h2>
            <div id="loadingSettings" class="text-sm text-yellow-500 text-center animate-pulse">正在讀取目前設定...</div>
            <form id="settingsForm" class="hidden">
                <div id="hoursGrid" class="grid grid-cols-3 gap-4 mb-6"></div>
                <button type="submit" id="saveBtn" class="w-full bg-gradient-to-r from-yellow-600 to-yellow-500 text-white font-bold py-3 rounded-xl shadow-lg">💾 儲存營業時段</button>
            </form>
        </div>

        <!-- 區塊二：臨時關閉時段 -->
        <div>
            <h2 class="text-lg font-semibold text-white mb-4 flex items-center"><span class="mr-2">⛔</span> 臨時關閉特定時段</h2>
            <form id="blockForm" class="space-y-4">
                <input type="date" id="blockDate" required class="w-full px-4 py-2 rounded-lg bg-gray-800 border border-gray-600 text-white outline-none mb-2">
                
                <div id="blockHoursGrid" class="grid grid-cols-3 gap-4 mb-4"></div>
                
                <button type="submit" id="blockBtn" class="w-full bg-red-600 hover:bg-red-500 text-white font-bold py-3 rounded-xl shadow-lg transition-colors">🔒 立即關閉選定時段</button>
            </form>
        </div>
    </div>

    <input type="hidden" id="lineUserId" value="">

    <script>
        const LIFF_ID = "2009930593-VRgp2wPB"; 
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzBtG9BKCAsDISWAGIRfTGkM0JnC4yIGbJnJfl79F_IYppAU6BJ_wBXy-14SpPC_TY/exec"; 
        
        const ALL_POSSIBLE_HOURS = ["08:00","09:00","10:00","11:00","12:00","13:00","14:00","15:00","16:00","17:00","18:00","19:00","20:00","21:00","22:00","23:00"];

        document.addEventListener("DOMContentLoaded", () => {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('blockDate').setAttribute('min', today);
            generateHourOptions();
            initializeLiff();
        });

        function generateHourOptions() {
            const grid = document.getElementById('hoursGrid');
            const blockGrid = document.getElementById('blockHoursGrid');
            ALL_POSSIBLE_HOURS.forEach(time => {
                grid.innerHTML += `<label class="flex flex-col items-center p-2 border border-gray-700 rounded-lg cursor-pointer hover:bg-gray-800"><span class="text-xs mb-1 text-gray-300">${time}</span><input type="checkbox" value="${time}" class="hour-checkbox w-5 h-5 accent-yellow-500 rounded bg-gray-700 border-gray-600"></label>`;
                blockGrid.innerHTML += `<label class="flex flex-col items-center p-2 border border-red-900 rounded-lg cursor-pointer hover:bg-red-900/40"><span class="text-xs mb-1 text-red-300">${time}</span><input type="checkbox" value="${time}" class="block-hour-checkbox w-5 h-5 accent-red-500 rounded bg-gray-700 border-gray-600"></label>`;
            });
        }

        async function initializeLiff() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (liff.isLoggedIn()) {
                    const profile = await liff.getProfile();
                    document.getElementById('lineUserId').value = profile.userId;
                    fetchCurrentSettings();
                } else { 
                    // ★ CTO 防呆機制：如果是網頁預覽視窗，不強制跳轉 LINE 登入，避免無限閃爍！
                    if (window !== window.top) {
                        const loadingDiv = document.getElementById('loadingSettings');
                        loadingDiv.classList.remove('animate-pulse', 'text-yellow-500');
                        loadingDiv.classList.add('text-red-400');
                        loadingDiv.innerText = "⚠️ 電腦預覽模式無法登入 LINE。\n請將 LIFF 網址傳到手機 LINE 裡面打開測試！";
                        return;
                    }
                    liff.login({ redirectUri: window.location.href }); 
                }
            } catch (err) { 
                console.error("LIFF 錯誤", err); 
                const loadingDiv = document.getElementById('loadingSettings');
                loadingDiv.classList.remove('animate-pulse', 'text-yellow-500');
                loadingDiv.classList.add('text-red-400');
                loadingDiv.innerText = "⚠️ 找不到 LINE 授權資訊。";
            }
        }

        async function fetchCurrentSettings() {
            try {
                const res = await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: "getSettings" }) });
                const data = await res.json();
                if (data.status === 'success') {
                    document.querySelectorAll('.hour-checkbox').forEach(cb => { if (data.hours.includes(cb.value)) cb.checked = true; });
                    document.getElementById('loadingSettings').classList.add('hidden');
                    document.getElementById('settingsForm').classList.remove('hidden');
                } else {
                    throw new Error(data.message || "資料庫回傳異常");
                }
            } catch (error) { 
                console.error("抓取設定失敗", error); 
                const loadingDiv = document.getElementById('loadingSettings');
                loadingDiv.classList.remove('animate-pulse', 'text-yellow-500');
                loadingDiv.classList.add('text-red-500', 'font-bold');
                loadingDiv.innerText = "❌ 無法連線到 Google 資料庫！請確認網址！";
            }
        }

        // 儲存常態營業時段
        document.getElementById('settingsForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            btn.innerHTML = '儲存中...'; btn.disabled = true;

            const selectedHours = Array.from(document.querySelectorAll('.hour-checkbox:checked')).map(cb => cb.value);
            try {
                const res = await fetch(GOOGLE_SCRIPT_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ action: "saveSettings", hours: selectedHours, userId: document.getElementById('lineUserId').value }) 
                });
                const data = await res.json();
                if (data.status === 'success') Swal.fire('成功', '營業時段已全面更新！', 'success');
                else throw new Error(data.message);
            } catch (error) { 
                Swal.fire('錯誤', error.message || '儲存失敗', 'error'); 
            } finally {
                btn.innerHTML = '💾 儲存營業時段'; btn.disabled = false;
            }
        });

        // 執行臨時關閉特定時段
        document.getElementById('blockForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const selectedBlockHours = Array.from(document.querySelectorAll('.block-hour-checkbox:checked')).map(cb => cb.value);
            
            if (selectedBlockHours.length === 0) {
                Swal.fire('溫馨提醒', '老闆，請至少勾選一個要關閉的時段喔！', 'warning');
                return;
            }

            const btn = document.getElementById('blockBtn');
            btn.innerHTML = '關閉中...'; btn.disabled = true;

            try {
                const res = await fetch(GOOGLE_SCRIPT_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ action: "addBlock", date: document.getElementById('blockDate').value, times: selectedBlockHours, userId: document.getElementById('lineUserId').value }) 
                });
                const data = await res.json();
                
                if (data.status === 'success') {
                    Swal.fire('成功', '選定的時段已全部在行事曆上關閉！', 'success');
                    document.getElementById('blockForm').reset(); 
                } else throw new Error(data.message);
            } catch (error) { 
                Swal.fire('錯誤', error.message || '操作失敗', 'error'); 
            } finally {
                btn.innerHTML = '🔒 立即關閉選定時段'; btn.disabled = false;
            }
        });
    </script>
</body>
</html>
